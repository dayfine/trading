# Build and publish two images from the multi-stage .devcontainer/Dockerfile:
#
#   ghcr.io/dayfine/trading-ci:latest          — used by ci.yml on every PR.
#                                                  Lean: system + opam deps
#                                                  + ocamlformat only.
#   ghcr.io/dayfine/trading-devcontainer:latest — used by the planned
#                                                  orchestrator-automation
#                                                  workflow (see
#                                                  dev/status/orchestrator-automation.md).
#                                                  Fat: ci + ocaml-lsp, odoc,
#                                                  utop, jj, jst, vim, warm
#                                                  _build. Local devcontainer
#                                                  builds still work too, but
#                                                  typically build locally
#                                                  from Dockerfile.
#
# devcontainer layers are incremental on top of ci in the build cache
# (FROM ci AS devcontainer), so the second push is cheap.
#
# Rebuilt when:
#   * .devcontainer/Dockerfile changes (new system / opam dep)
#   * any *.opam file changes (dependency graph changed)
#   * weekly cron (pick up upstream base-image security patches)
#   * manually via workflow_dispatch
name: Build CI image

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/Dockerfile'
      - 'trading/**/*.opam'
      - '.github/workflows/image.yml'
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to push (default: latest)'
        required: false
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: ci
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/trading-ci:${{ github.event.inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          target: devcontainer
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/trading-devcontainer:${{ github.event.inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
