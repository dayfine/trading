# SP500 15y golden-run: runs sp500-2010-2026 (perf-tier 3) under
# goldens-sp500-historical/ on a nightly cron.
#
# Split out of golden-runs-sp500.yml on 2026-05-08 because the 15y
# scenario currently OOMs on 8 GB GHA runners (peak RSS ~11.4 GB,
# wall ~43 min). See dev/notes/next-session-priorities-2026-05-08.md
# §Q1 and §Q4. Once the memory cliff is fixed and the run reliably
# completes within budget, this workflow can be promoted back to a
# per-push trigger.
#
# Non-blocking by design: continue-on-error: true. Failure here does
# not gate merges; it surfaces as a nightly signal that 15y regressed.
#
# Prerequisite: bar data for the SP500 universe (full history back to
# ~2009) must be committed under trading/test_data/.
#
# Expected runtime (post-Q1 fix target): ~45 min wall, ≤2 GB peak RSS.
# Pre-fix: 43 min wall, 11.4 GB peak (OOMs on 8 GB runner).
#
# Trigger:
#   - cron: 09:00 UTC daily (= 02:00 PT) — after most local work is done
#   - workflow_dispatch for manual reruns
name: golden-runs-sp500-15y

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  golden-sp500-15y:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    env:
      HOME: /home/opam
      TRADING_IN_CONTAINER: "1"
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
      # Restrict to 15y historical goldens.
      GOLDEN_SP500_SUBDIRS: goldens-sp500-historical
    steps:
      - uses: actions/checkout@v4

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: trading/_build
          key: dune-${{ runner.os }}-${{ hashFiles('trading/**/*.opam', 'trading/**/dune', 'trading/**/*.ml', 'trading/**/*.mli') }}
          restore-keys: |
            dune-${{ runner.os }}-

      - name: Run SP500 15y golden
        id: golden_sp500_15y
        continue-on-error: true
        run: dev/scripts/golden_sp500_postsubmit.sh

      - name: Publish summary
        if: always()
        run: |
          summary_file=$(ls -1t dev/perf/golden-sp500-postsubmit-*/summary.txt 2>/dev/null | head -1)
          if [ -n "$summary_file" ] && [ -f "$summary_file" ]; then
            {
              echo "## SP500 15y golden run"
              echo ""
              echo '```'
              cat "$summary_file"
              echo '```'
            } >>"$GITHUB_STEP_SUMMARY"
          else
            echo "SP500 15y golden run: no summary produced." >>"$GITHUB_STEP_SUMMARY"
          fi

      # Upload run artefacts (equity_curve.csv, splits.csv, trades.csv, actual.sexp,
      # progress.sexp, summary.sexp) so postmortem analysis after a FAIL doesn't
      # require re-running the 50-minute scenario.  Retain 7 days — long enough
      # to investigate, short enough to keep storage usage low.  See
      # `dev/notes/15y-split-day-regression-2026-05-08.md` §"Fix-path" for how
      # these are used.
      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-sp500-15y-${{ github.run_id }}
          path: |
            dev/perf/golden-sp500-postsubmit-*/
            **/dev/backtest/scenarios-*/sp500-2010-2026-historical/
          retention-days: 7
          if-no-files-found: warn
