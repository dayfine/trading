# Build + test gate for pull requests and main pushes.
#
# Runs inside the prebuilt GHCR image produced by image.yml, so the job only
# has to check out the source and invoke dune. All deps (opam, ta-lib,
# openblas, plplot, …) are already installed in the image.
#
# The image bakes a copy of `trading/` under /workspaces/trading-1/ for its
# build verification step, but GitHub Actions mounts the checkout under
# /__w/... and runs there — so the baked snapshot is ignored and we build
# the PR's actual source.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # The ocaml/opam base image sets USER opam (uid 1000) by default.
      # GitHub Actions creates /__w/_temp/_runner_file_commands/ owned by
      # the host runner user — the non-root container user can't write to
      # it, which crashes actions/checkout's post-step save_state (EACCES).
      # Run the container as root and point HOME at /home/opam so opam env
      # still finds the installed 5.3 switch at /home/opam/.opam.
      options: --user 0
    env:
      HOME: /home/opam
      # Data_path.default_data_dir defaults to /workspaces/trading-1/data (the
      # dev container's mounted data dir). In CI the checkout lives under
      # /__w/..., so point the data-loading code at $GITHUB_WORKSPACE/data.
      # test_data/ is a curated subset of production data/ (both use the
      # same CSV format + sharding layout). It is checked into git so CI
      # can run data-dependent tests without the full /data mount.
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
    defaults:
      run:
        shell: bash
        working-directory: trading
    steps:
      - uses: actions/checkout@v4

      # Cache _build/ between runs. dune is incremental: when the source +
      # dune files + opam dep set haven't changed, restoring _build turns
      # `dune build` into a near-instant no-op (was ~40s cold).
      #
      # Key strategy: hash everything dune sees as input. On a hit we get
      # the prior build artefacts; on a miss (any source/dep file changed)
      # we do a full rebuild. No restore-keys fallback: partial caches with
      # mismatched .exe files cause SIGILL on module splits (e.g. #1113/#1115).
      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: trading/_build
          key: dune-${{ runner.os }}-${{ hashFiles('trading/**/*.opam', 'trading/**/dune', 'trading/**/dune-project', 'trading/**/*.ml', 'trading/**/*.mli') }}

      # Smoke-test: print CPU flags and verify ta-lib loads without SIGILL.
      # When this failure recurs, the log will show the CPU flag set and the
      # exact exit code (132 = SIGILL) at the top of the job rather than
      # buried mid-suite. Runs before dune build so failures are immediately
      # visible. See issue #1129.
      - name: CPU-flag + ta-lib smoke test
        run: |
          echo "=== CPU flags ==="
          grep '^flags' /proc/cpuinfo | head -1
          echo "=== ta-lib linkage ==="
          # Find libta-lib.so and verify it contains no AVX-512 instructions.
          # AVX-512 instructions (zmm registers, evex prefix, KNC) cause SIGILL
          # on GHA runners that don't support AVX-512 (most ubuntu-latest hosts).
          TA_LIB_SO=$(ldconfig -p | grep 'libta-lib' | awk '{print $NF}' | head -1)
          if [ -z "$TA_LIB_SO" ]; then
            echo "WARNING: libta-lib.so not found via ldconfig — may not be installed yet"
          else
            echo "libta-lib.so found at: $TA_LIB_SO"
            echo "=== Verifying libta-lib.so ISA (objdump check) ==="
            if objdump -d "$TA_LIB_SO" 2>/dev/null | grep -q 'zmm\|evex\|knc'; then
              echo "FAIL: libta-lib.so contains AVX-512 instructions — will SIGILL on non-AVX512 runners"
              exit 1
            else
              echo "OK: libta-lib.so contains no AVX-512 instructions"
            fi
          fi

      - name: dune build
        run: |
          eval $(opam env)
          dune build

      - name: dune runtest
        run: |
          eval $(opam env)
          dune runtest

      - name: dune fmt (check only)
        run: |
          eval $(opam env)
          # @fmt fails if formatting would change anything; no --auto-promote.
          dune build @fmt
