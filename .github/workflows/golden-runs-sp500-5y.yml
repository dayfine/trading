# SP500 5y golden-run postsubmit: runs the 3 sp500-2019-2023* scenarios
# (perf-tier 3) under goldens-sp500/ on every push to main.
#
# Split out of golden-runs-sp500.yml on 2026-05-08 so 5y signal isn't
# blocked by 15y noise (sp500-2010-2026 currently OOMs on 8 GB runners
# while Q1 memory cliff is being investigated). 15y runs moved to
# golden-runs-sp500-15y.yml on a less-frequent cron.
# See dev/notes/next-session-priorities-2026-05-08.md §Q4.
#
# This is a POSTSUBMIT gate — runs after merge, not before. Catches
# strategy regressions in the canonical 5y benchmark within minutes
# of a merge.
#
# Non-blocking by design: continue-on-error: true for the initial soak
# period (~4 weeks). Flip to false after 4 consecutive clean runs at
# ≤30 min wall time. See dev/notes/ci-golden-runs-design-2026-05-06.md §Phase 1.
#
# Prerequisite: bar data for the SP500 universe must be committed under
# trading/test_data/. See dev/scripts/prepare_ci_data.sh for the one-time
# data preparation step.
#
# Expected runtimes (GHA ubuntu-latest):
#   sp500-2019-2023:           ~5 min pre-Cell-E (~15 min post-Cell-E #1036)
#   sp500-2019-2023-long-only: ~5 min pre-Cell-E (~12 min post-Cell-E)
#   sp500-2019-2023-bah-spy:   ~1 min   (BAH, not affected by Cell E)
# Cell E adds ~3.3x trade count (81 → 264 trades on 2019-2023) which roughly
# triples wall time. Budget bumped from 30 → 60 min on 2026-05-11.
#
# Scenarios discovered: any *.sexp with ";; perf-tier: 3" under
# trading/test_data/backtest_scenarios/goldens-sp500/
# See dev/scripts/golden_sp500_postsubmit.sh for the runner logic.
name: golden-runs-sp500-5y

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  golden-sp500-5y:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    env:
      HOME: /home/opam
      TRADING_IN_CONTAINER: "1"
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
      # Restrict to 5y goldens — historical (15y) runs separately.
      GOLDEN_SP500_SUBDIRS: goldens-sp500
    steps:
      - uses: actions/checkout@v4

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: trading/_build
          key: dune-${{ runner.os }}-${{ hashFiles('trading/**/*.opam', 'trading/**/dune', 'trading/**/*.ml', 'trading/**/*.mli') }}

      - name: Run SP500 5y golden postsubmit
        id: golden_sp500_5y
        # Non-blocking during initial soak. Flip to false after 4 clean runs.
        continue-on-error: true
        run: dev/scripts/golden_sp500_postsubmit.sh

      - name: Publish summary
        if: always()
        run: |
          summary_file=$(ls -1t dev/perf/golden-sp500-postsubmit-*/summary.txt 2>/dev/null | head -1)
          if [ -n "$summary_file" ] && [ -f "$summary_file" ]; then
            {
              echo "## SP500 5y golden postsubmit"
              echo ""
              echo '```'
              cat "$summary_file"
              echo '```'
            } >>"$GITHUB_STEP_SUMMARY"
          else
            echo "SP500 5y golden postsubmit: no summary produced." >>"$GITHUB_STEP_SUMMARY"
          fi

      # Upload run artefacts (equity_curve.csv, splits.csv, trades.csv,
      # actual.sexp, progress.sexp, summary.sexp) so postmortem analysis after a
      # FAIL doesn't require re-running. Retain 7 days.
      - name: Upload run artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-sp500-5y-${{ github.run_id }}
          path: |
            dev/perf/golden-sp500-postsubmit-*/
            **/dev/backtest/scenarios-*/sp500-2019-2023*/
          retention-days: 7
          if-no-files-found: warn
