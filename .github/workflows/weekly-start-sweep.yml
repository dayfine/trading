# Weekly-start sweep — refresh the BAH-SPY entry-timing dispersion artefact.
#
# Runs every Monday at 14:00 UTC (after US market close prep). For each Monday
# in the trailing 3-year window, runs a Buy-and-Hold SPY simulation from that
# Monday through today and captures the per-cell return / drawdown / Sharpe
# metrics. Persists results to:
#   - trading/test_data/weekly-start-sweep-bah-spy.sexp  (golden artefact)
#   - dev/sweep/weekly-start-sweep-bah-spy.md            (human-readable)
#
# When artefacts differ from main, opens a PR for human review. The PR is
# advisory — the human merges (or closes if the new snapshot is uninteresting).
# Each run produces a FRESH snapshot — end_date floats with the run date.
#
# SECRETS REQUIRED
#   BOT_GITHUB_TOKEN — fine-grained PAT; Contents R+W, Pull requests R+W.
#   (Shared with orchestrator.yml / track-pacer-weekly.yml.)
name: Weekly start sweep (BAH SPY)

on:
  schedule:
    - cron: "0 14 * * 1" # Monday 14:00 UTC = 09:00 ET (post-market open)
  workflow_dispatch:

concurrency:
  group: weekly-start-sweep
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    env:
      HOME: /home/opam
      TRADING_IN_CONTAINER: "1"
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Compute today's date
        id: today
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Build sweep tool
        working-directory: trading
        run: |
          eval $(opam env)
          dune build trading/backtest/sweep_weekly_start/bin/main.exe

      - name: Run weekly-start sweep
        working-directory: trading
        run: |
          eval $(opam env)
          ./_build/default/trading/backtest/sweep_weekly_start/bin/main.exe \
            --symbol SPY \
            --init-cash 100000 \
            --years-back 3 \
            --fixtures-root "${GITHUB_WORKSPACE}/trading/test_data/backtest_scenarios" \
            --out-sexp "${GITHUB_WORKSPACE}/trading/test_data/weekly-start-sweep-bah-spy.sexp" \
            --out-markdown "${GITHUB_WORKSPACE}/dev/sweep/weekly-start-sweep-bah-spy.md"

      - name: Push branch and open PR
        if: always()
        env:
          DATE: ${{ steps.today.outputs.date }}
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          BRANCH="ops/weekly-start-sweep-${DATE}"
          SEXP="trading/test_data/weekly-start-sweep-bah-spy.sexp"
          MD="dev/sweep/weekly-start-sweep-bah-spy.md"

          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"

          # Bail out cleanly when nothing changed (sweep window is identical
          # to last run — unlikely but possible).
          if git diff --quiet HEAD -- "${SEXP}" "${MD}"; then
            echo "Sweep artefacts unchanged vs main; nothing to commit."
            exit 0
          fi

          git checkout -b "${BRANCH}"
          git add "${SEXP}" "${MD}"
          git commit -m "ops(sweep): weekly-start BAH SPY refresh ${DATE}"
          git push origin "${BRANCH}"

          if [ -f "${MD}" ]; then
            BEST_LINE="$(grep -m1 '^- Best entry' "${MD}" || true)"
            WORST_LINE="$(grep -m1 '^- Worst entry' "${MD}" || true)"
            MEDIAN_LINE="$(grep -m1 '^- Median CAGR' "${MD}" || true)"
            CELLS_LINE="$(grep -m1 '^Cells:' "${MD}" || true)"
            BODY="## Weekly-start sweep -- ${DATE}

          ${CELLS_LINE}
          ${BEST_LINE}
          ${WORST_LINE}
          ${MEDIAN_LINE}

          Full report: [\`${MD}\`](https://github.com/${REPO}/blob/${BRANCH}/${MD})

          > Generated by [.github/workflows/weekly-start-sweep.yml](https://github.com/${REPO}/blob/main/.github/workflows/weekly-start-sweep.yml). Advisory: review and merge (or close if uninteresting). Each run is a fresh snapshot; end_date floats with the run date."
          else
            BODY="## Weekly-start sweep -- ${DATE}

          Workflow ran but \`${MD}\` was not produced. Check the workflow log."
          fi

          gh pr create \
            --title "ops(sweep): weekly-start BAH SPY ${DATE}" \
            --body "${BODY}" \
            --base main \
            --head "${BRANCH}"
