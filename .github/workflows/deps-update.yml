# Weekly dependency freshness check.
#
# Runs inside the CI image, captures the installed opam package versions,
# and compares against the committed snapshot. If anything changed (new
# image picked up a different opam solver resolution), opens a PR with
# the updated snapshot so the diff is visible and merge = opt-in.
#
# This catches silent version drift (like the 0.28→0.29 ocamlformat
# issue) before it breaks developer or CI builds.
#
# Runs after image.yml's Monday 06:00 UTC cron, which rebuilds the image.
# The 08:00 schedule gives the image build time to complete and push.
name: Dependency freshness check

on:
  schedule:
    - cron: '0 8 * * 1' # 08:00 UTC every Monday (after image rebuild)
  workflow_dispatch:

jobs:
  check-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    env:
      HOME: /home/opam
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Capture installed package versions
        run: |
          eval $(opam env)
          opam list --installed --columns=name,version --short \
            | sort > trading/deps-snapshot.txt

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet trading/deps-snapshot.txt 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dependency changes detected:"
            git diff trading/deps-snapshot.txt || true
          fi

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: "chore: update opam deps snapshot"
          title: "chore: weekly opam dependency update"
          body: |
            ## Summary

            The CI image was rebuilt this week and the opam solver picked
            different package versions than last week's snapshot. This PR
            updates `trading/deps-snapshot.txt` to reflect the new state.

            **Review the diff** to see what changed. Merge = opt-in to the
            new versions. If a version bump is undesirable, pin it in
            `.devcontainer/Dockerfile` before merging.

            🤖 Generated by the weekly deps-update workflow.
          branch: deps/opam-weekly
          delete-branch: true
