# Daily orchestrator run on GitHub Actions.
#
# Runs `lead-orchestrator` via anthropics/claude-code-action inside the prebuilt
# `trading-devcontainer` image (already has jj, jst, opam env baked in). The
# orchestrator writes its daily summary to `dev/daily/<date>-runN.md` and
# whatever subagent work it dispatched to branches + PRs. A post-step pushes
# the daily summary branch, opens a PR, then fails the job if the summary has
# any entries in the `## Escalations` section — that's our partial-failure
# signal (see dev/status/orchestrator-automation.md § "Partial-failure
# reporting").
#
# ----------------------------------------------------------------------------
# SECRETS REQUIRED BEFORE THIS WORKFLOW CAN RUN
# ----------------------------------------------------------------------------
# The first `workflow_dispatch` run will fail at the "Run lead-orchestrator"
# step until the human completes the following one-time setup (tracked in
# dev/status/orchestrator-automation.md § "Implementation sequencing" step 2):
#
#   1. BOT_GITHUB_TOKEN — fine-grained Personal Access Token scoped to
#      this repo only. Create at
#      https://github.com/settings/tokens?type=beta
#      Permissions: Contents R+W, Pull requests R+W. Expiration: 1 year
#      (or whatever; set a calendar reminder to rotate).
#      Store as repo secret `BOT_GITHUB_TOKEN`.
#
#      Why a PAT and not the default GITHUB_TOKEN: pushes using the built-in
#      token do not trigger downstream workflows (GitHub safety feature),
#      so CI would not re-run on branches this orchestrator pushes.
#      PAT-issued pushes do trigger them.
#
#      Why a PAT and not a custom GitHub App: both work; an App auto-
#      rotates short-lived tokens and is the Claude Code docs' recommended
#      path, but requires one-time registration + install. For a single-
#      developer setup the PAT is simpler. Swap to an App later if
#      rotation burden hurts.
#
#   2. CLAUDE_CODE_OAUTH_TOKEN — generated on a subscription-authenticated
#      machine via `claude setup-token`. The Pro/Max subscription's session
#      limits act as the effective cost ceiling for this workflow.
#
# ----------------------------------------------------------------------------
name: Daily orchestrator

on:
  # Two overnight runs (12 AM / 5 AM Pacific) so routine agent work
  # progresses while the human is asleep. Daytime slots dropped because
  # substantive work happens in dedicated local sessions (memory:
  # `project_orchestrator_off.md` 2026-04-25 cost decision; revisited
  # 2026-04-26 — keep nightly cadence only). Minute `:17` avoids
  # top-of-hour GHA scheduler load (scheduled jobs at :00 – :05 get
  # delayed or silently dropped). GitHub cron is UTC-only, no DST
  # awareness — these are set for UTC-7 (PDT); during PST months they
  # drift back 1 hour.
  schedule:
    - cron: "17 7 * * *"    # 00:17 PT
    - cron: "17 12 * * *"   # 05:17 PT
  workflow_dispatch:

# Queue, do not cancel, if a previous run is still executing when the
# next cron fires. A run mid-dispatch must not be killed — in-flight
# subagents would leave branches half-pushed. Max overlap window is
# bounded by timeout-minutes (180) below.
concurrency:
  group: daily-orchestrator
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # See ci.yml for the rationale: the base image has USER opam, but
      # Actions' post-step file bookkeeping needs root. HOME stays pointed at
      # /home/opam so the opam switch is still discoverable.
      options: --user 0
    env:
      HOME: /home/opam
      # run-in-env.sh takes the native path (cd + opam env, no docker
      # wrapping) when this is set. Agent prompts invoke the wrapper so they
      # work identically in local-docker and in-container (GHA) environments.
      TRADING_IN_CONTAINER: "1"
      # Point data-dependent tests at the in-repo test fixtures (same as
      # ci.yml). Without this, Data_path.default_data_dir() falls back to
      # the Docker-workspace path /workspaces/trading-1/data which does not
      # exist in the GHA runner — health-scanner reports 7 test suites /
      # 38 assertion failures. See dev/daily/2026-04-16-run1.md escalation.
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so jj can see main@origin and rebase properly.
          fetch-depth: 0
          # Use the PAT so actions/checkout writes BOT_GITHUB_TOKEN into
          # origin's http.extraheader. Subagent `jj git push` calls then
          # authenticate as the PAT owner, which is what makes the
          # downstream CI workflow fire on the pushed branch (GitHub
          # suppresses workflow triggers for pushes authenticated with
          # the ephemeral GITHUB_TOKEN — see the secrets block above for
          # the full rationale). Without this override, checkout defaults
          # to GITHUB_TOKEN and every subagent push ends up in "Action
          # required" limbo instead of running CI.
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Compute today's date
        id: today
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Colocate jj on the git checkout
        shell: bash
        run: |
          set -euo pipefail
          # actions/checkout@v4 produces a git-only tree. `jst submit`
          # (stacked-PR tool used by feat-agents) requires .jj/, so we
          # colocate jj on top of the existing git repo. This keeps git
          # as the wire format (pushes, remotes, CI triggers) while
          # giving agents the jj local-commit UX they use locally.
          # Decided 2026-04-16 (see dev/decisions.md) — option (2) over
          # adding gh CLI to the container.
          #
          # We skip `jj git fetch`: jj 0.39 shells to `git fetch --porcelain`
          # which requires git >= 2.41, but the ubuntu-22.04 devcontainer base
          # ships git 2.34. actions/checkout@v4 (fetch-depth: 0 above) already
          # populated origin refs in .git/, and `jj git init --colocate`
          # auto-imports them — so no remote fetch is needed here.
          jj git init --colocate

      - name: Run lead-orchestrator
        id: run-orchestrator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          # show_full_output omitted (default false). Tool-call traces are
          # dumped to the GHA log at ~2-3 MB per run and duplicate content
          # that already lands in the merged daily-summary PR. We read the
          # summary instead; full logs are only needed when debugging the
          # workflow infra itself (container setup, checkout, etc.).
          prompt: |
            Run the daily orchestrator session. Today is ${{ steps.today.outputs.date }}.
            Read .claude/agents/lead-orchestrator.md and follow it end to end.
          claude_args: |
            --agent lead-orchestrator
            --allowedTools Agent,Bash,Read,Write,Edit,Glob,Grep
            --max-turns 200

      - name: Capture run cost from execution file
        # Fallback branch 1b: claude-code-action@v1 exposes an execution_file
        # output (path to claude-execution-output.json) containing the full SDK
        # message array. The result message includes total_cost_usd — the total
        # cost for the entire orchestrator run including all internally-spawned
        # subagents (Agent tool calls). Per-subagent breakdown is not available
        # from the action; subagents are internal to the single Claude Code process.
        #
        # We parse total_cost_usd and write a structured budget record to
        # dev/budget/<date>-run<N>.json. The orchestrator's Step 7 reads this file
        # (if present) and emits measured cost in its ## Budget section.
        #
        # The step runs `if: always()` so it captures cost even when the
        # orchestrator exits non-zero (rate-limit, timeout) — partial-run cost
        # is still valuable for budget tracking.
        if: always()
        env:
          DATE: ${{ steps.today.outputs.date }}
          EXECUTION_FILE: ${{ steps.run-orchestrator.outputs.execution_file }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          BUDGET_DIR="dev/budget"
          mkdir -p "$BUDGET_DIR"

          # File naming: include github.run_id so concurrent or fast-successive
          # runs never collide on the same filename. Earlier design used a
          # RUN_N counter derived from `find dev/budget/${DATE}*.json` on main,
          # but prior-run PRs may not have auto-merged yet when the next run
          # starts — every run saw main with 0 files, picked run1, and
          # clobbered each other's branch on force-push. See runs
          # 24762831070 / 24774046357 / 24788029614 (2026-04-22) for the
          # post-mortem: $6.29 and $2.69 measurements lost to overwrite
          # before this fix.
          OUT_FILE="${BUDGET_DIR}/${DATE}-${GITHUB_RUN_ID}.json"
          RUN_ID="${DATE}-${GITHUB_RUN_ID}"

          # Parse total_cost_usd from the execution file.
          # The execution file is a JSON array of SDK messages; the last element
          # with type="result" carries total_cost_usd (float, USD).
          TOTAL_COST="null"
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "${EXECUTION_FILE}" ]; then
            TOTAL_COST="$(python3 -c "
          import json, sys
          data = json.load(open('${EXECUTION_FILE}'))
          # data is an array; find the last result message
          for msg in reversed(data if isinstance(data, list) else [data]):
              if isinstance(msg, dict) and msg.get('type') == 'result':
                  cost = msg.get('total_cost_usd')
                  if cost is not None:
                      print(cost)
                      sys.exit(0)
          print('null')
          " 2>/dev/null || echo "null")"
          else
            echo "execution_file output not available (${EXECUTION_FILE:-empty}); recording null cost."
          fi

          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Belt-and-suspenders: TOTAL_COST is initialized to "null" above and
          # reassigned by the python3 -c block, but if any future edit leaves it
          # as an empty string the heredoc below would emit `"total_cost_usd": ,`
          # and crash Python at parse time. Coerce to "null" if empty.
          TOTAL_COST="${TOTAL_COST:-null}"

          python3 - <<PYEOF
          import json, os
          data = {
            "run_id": os.environ["RUN_ID"] if False else "${RUN_ID}",
            "timestamp": "${TIMESTAMP}",
            "commit_sha": "${COMMIT_SHA}",
            "measurement_source": "claude-code-action execution_file (total_cost_usd from SDKResultMessage)",
            "fallback_branch": "1b",
            "notes": (
              "total_cost_usd covers entire orchestrator run including all "
              "internally-spawned subagents (Agent tool calls). Per-subagent "
              "breakdown not available from action output — see "
              "dev/status/cost-tracking.md for limitation details."
            ),
            "subagents": [
              {
                "name": "orchestrator-total",
                "model": "sonnet",
                "input_tokens": None,
                "output_tokens": None,
                "cache_read_input_tokens": None,
                "cache_creation_input_tokens": None,
                "estimated_cost_usd": None,
                "note": (
                  "Per-subagent breakdown not available from claude-code-action. "
                  "total_cost_usd in totals covers all spawned subagents."
                )
              }
            ],
            "totals": {
              "input_tokens": None,
              "output_tokens": None,
              "cache_read_input_tokens": None,
              "cache_creation_input_tokens": None,
              "total_cost_usd": ${TOTAL_COST},
              "measurement": "measured from claude-code-action execution_file total_cost_usd"
            }
          }
          with open("${OUT_FILE}", "w") as f:
              json.dump(data, f, indent=2)
          print(f"Budget record written: ${OUT_FILE} (total_cost_usd=${TOTAL_COST})")
          PYEOF

          # Expose the written path so the commit step can find it deterministically.
          echo "out_file=${OUT_FILE}" >> "$GITHUB_OUTPUT"
        id: capture-cost

      - name: Bundle budget into daily summary and auto-merge
        # The cost-capture step writes dev/budget/<date>-<run_id>.json.
        # This step adds it onto the ops/daily-* branch the lead-orchestrator
        # already pushed, then auto-merges that PR — eliminating the separate
        # ops/budget-* PR that previously sat open waiting for auto-merge.
        #
        # Why consolidate: the orphan ops/budget-* PR could fall behind main if
        # ops/daily-* merged first and main moved (e.g. #577 needed manual
        # rebase). Bundling into the same PR removes that race entirely.
        #
        # Fail-mode: if the orchestrator step failed and no ops/daily-* branch
        # was pushed, PR_NUMBER lookup returns empty. This step detects that
        # case, commits the budget JSON to a standalone ops/budget-* branch as
        # a fallback (same behaviour as the deleted "Commit budget record" step),
        # and annotates ::warning:: so the human is aware a separate merge is
        # needed. It does NOT open a PR for the fallback branch — the annotation
        # is the signal; human merges directly.
        if: always() && steps.capture-cost.outputs.out_file != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          OUT_FILE: ${{ steps.capture-cost.outputs.out_file }}
          REPO: ${{ github.repository }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          if [ ! -f "$OUT_FILE" ]; then
            echo "Budget record $OUT_FILE not present; skipping."
            exit 0
          fi

          BUDGET_BASENAME="$(basename "$OUT_FILE" .json)"
          TOTAL_COST="$(python3 -c "import json; d=json.load(open('${OUT_FILE}')); v=d.get('totals',{}).get('total_cost_usd'); print('null' if v is None else f'{v:.4f}')")"

          # safe.directory: inside the container we run as --user 0 on a
          # workspace that actions/checkout initialized as a non-root user.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"

          # ---------------------------------------------------------------
          # Locate the ops/daily-* PR that lead-orchestrator opened.
          # The branch name is ops/daily-${DATE}[-runN] — look up any open
          # PR whose head branch starts with ops/daily-$(date +%F).
          # ---------------------------------------------------------------
          DATE="$(date +%F)"
          OWNER="${REPO%/*}"
          DAILY_PR_NUMBER="$(curl -sSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=open&base=main&per_page=20" \
            | python3 -c "
          import json, sys, os
          prs = json.load(sys.stdin)
          date = os.environ['DATE']
          prefix = f'ops/daily-{date}'
          matches = [p for p in prs if p.get('head',{}).get('ref','').startswith(prefix)]
          print(matches[0]['number'] if matches else '')
          " DATE="$DATE" 2>/dev/null || true)"

          DAILY_BRANCH="$(curl -sSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=open&base=main&per_page=20" \
            | python3 -c "
          import json, sys, os
          prs = json.load(sys.stdin)
          date = os.environ['DATE']
          prefix = f'ops/daily-{date}'
          matches = [p for p in prs if p.get('head',{}).get('ref','').startswith(prefix)]
          print(matches[0]['head']['ref'] if matches else '')
          " DATE="$DATE" 2>/dev/null || true)"

          if [ -z "$DAILY_PR_NUMBER" ] || [ -z "$DAILY_BRANCH" ]; then
            echo "::warning::No open ops/daily-${DATE} PR found. lead-orchestrator may have failed or already merged. Committing budget JSON to fallback branch ops/budget-${BUDGET_BASENAME} — human merge required."
            git checkout -b "ops/budget-${BUDGET_BASENAME}"
            git add "$OUT_FILE"
            if git diff --cached --quiet; then
              echo "Budget already on main; nothing to commit."
              exit 0
            fi
            git commit -m "ops(budget): record ${BUDGET_BASENAME} (\$${TOTAL_COST})"
            git push origin "ops/budget-${BUDGET_BASENAME}"
            echo "Fallback branch pushed. PR not opened — human should merge ops/budget-${BUDGET_BASENAME} directly."
            exit 0
          fi

          echo "Found ops/daily-* PR #${DAILY_PR_NUMBER} on branch ${DAILY_BRANCH}; bundling budget JSON."

          # ---------------------------------------------------------------
          # Add the budget JSON onto the daily summary branch.
          # ---------------------------------------------------------------
          git fetch origin "${DAILY_BRANCH}"
          git checkout "${DAILY_BRANCH}"
          git add "$OUT_FILE"
          if git diff --cached --quiet; then
            echo "Budget JSON already on branch (re-run?); skipping add."
          else
            git commit -m "ops(budget): bundle ${BUDGET_BASENAME} (\$${TOTAL_COST}) into daily summary"
            git push origin "${DAILY_BRANCH}"
            echo "Budget JSON committed and pushed to ${DAILY_BRANCH}."
          fi

          # ---------------------------------------------------------------
          # Auto-merge the daily summary PR (now contains daily MD + budget
          # JSON) via REST PUT /merge. REST is simpler than GraphQL
          # enablePullRequestAutoMerge and does not require a CI green gate,
          # which is appropriate here: ops/daily-* PRs are observational
          # (no code, no behavior changes) and the budget JSON is additive.
          # The lead-orchestrator Step 8a previously owned this merge; it
          # now defers to this step so the merge happens after the budget
          # JSON is bundled.
          # ---------------------------------------------------------------
          MERGE_RESPONSE="$(curl -sSL -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"merge_method":"squash"}' \
            "https://api.github.com/repos/${REPO}/pulls/${DAILY_PR_NUMBER}/merge")"
          MERGED="$(printf '%s' "$MERGE_RESPONSE" | python3 -c 'import json,sys;r=json.load(sys.stdin);print("true" if r.get("merged") else "false")' 2>/dev/null || echo false)"
          if [ "$MERGED" = "true" ]; then
            echo "Auto-merged PR #${DAILY_PR_NUMBER} (daily summary + budget JSON)."
          else
            echo "::warning::Auto-merge failed for PR #${DAILY_PR_NUMBER}. Response: ${MERGE_RESPONSE}"
            echo "Human merge required for the daily summary PR. Budget JSON is already on the branch."
          fi

      - name: Locate daily summary (for escalations check)
        id: publish-summary
        shell: bash
        run: |
          set -euo pipefail
          DATE="$(date +%F)"
          # lead-orchestrator now owns committing/pushing the daily summary
          # branch and opening its PR (it runs with BOT_GITHUB_TOKEN via the
          # claude-code-action and has jj + curl available inside the
          # devcontainer). This step only locates the summary file on disk
          # so the next step can scan it for escalations.
          #
          # Prior versions of this step also did `git switch -c ops/daily-*`
          # + git push + PR create, which collided with the agent's own
          # push once the agent gained that capability. See run
          # 24526632726 for the post-mortem.
          #
          # Pick the newest per-run summary for today: either the plain
          # dev/daily/${DATE}.md or a dev/daily/${DATE}-runN.md. We
          # deliberately exclude dev/daily/${DATE}-summary.md (the
          # consolidated multi-run rollup the orchestrator also writes),
          # because it concatenates Escalations sections from prior runs.
          # Matching it here would re-surface already-resolved `[critical]`
          # bullets from earlier runs on the same day and fail the gate on
          # a clean run. See run 24745079773 (2026-04-21) for the
          # post-mortem: run-4's own summary was clean, but the `ls -t`
          # glob picked up the consolidated summary (written 8s later),
          # which still carried `[critical]` bullets from runs 1/2/3.
          SUMMARY="$(ls -t dev/daily/${DATE}.md dev/daily/${DATE}-run*.md 2>/dev/null | head -n 1 || true)"
          if [ -z "$SUMMARY" ]; then
            SUMMARY="$(ls -t dev/daily/*.md 2>/dev/null | grep -v -- '-summary\.md$' | head -n 1 || true)"
          fi
          if [ -z "$SUMMARY" ] || [ ! -f "$SUMMARY" ]; then
            echo "::error::No daily summary file found under dev/daily/."
            exit 1
          fi
          echo "Using daily summary: $SUMMARY"
          echo "summary_path=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Fail on escalations
        env:
          SUMMARY: ${{ steps.publish-summary.outputs.summary_path }}
        shell: bash
        run: |
          set -euo pipefail
          # Extract the ## Escalations section body (up to the next H2).
          section="$(awk '
            /^## Escalations/ { in_section=1; next }
            /^## / && in_section { exit }
            in_section { print }
          ' "$SUMMARY")"

          # Gate only on top-level bullets tagged [critical]. The summary
          # template uses severity tags — [critical], [medium], [info] — so
          # "gate iff the author tagged a top-level escalation critical" is
          # the cleanest contract. [medium] and [info] items surface for
          # visibility without failing the run.
          #
          # Prior pattern matched any `- ` bullet and caught sub-bullets of
          # medium items (e.g. "- (a) Reword the comment" under a [medium]
          # linter-fix suggestion), failing the job on cosmetic notes.
          #
          # Next iteration moved to grep -Ei '\[critical\]' — but that
          # matches the literal string anywhere in the Escalations section,
          # including inside prose describing mitigations (e.g. "cross-check
          # `[critical]` claims against dune build @runtest" in a [medium]
          # bullet, which failed run 24606800779 on 2026-04-18 despite zero
          # actual critical items).
          #
          # Current pattern anchors to a top-level bullet start:
          #   ^-[[:space:]]+(\*\*)?\[critical\]
          # matches `- [critical] ...` and `- **[critical] ...`, which is
          # how the summary template formats escalation bullets. Sub-bullets
          # (indented) and prose containing the literal token `[critical]`
          # are correctly ignored.
          #
          # Positive `[critical]` match means an untagged escalation does
          # NOT gate. That's intentional: tags are a contract, and forcing
          # authors to tag encourages them to think about severity. If an
          # escalation genuinely warrants gating, tag it.
          escalations="$(printf '%s\n' "$section" \
            | grep -E '^-[[:space:]]+(\*\*)?\[critical\]' \
            || true)"

          if [ -n "$escalations" ]; then
            echo "::error::Daily summary has escalations; marking run as failed."
            echo "Escalations found in $SUMMARY:"
            printf '%s\n' "$escalations"
            exit 1
          fi
          echo "No escalations in $SUMMARY — clean run."
