# Daily orchestrator run on GitHub Actions.
#
# Runs `lead-orchestrator` via anthropics/claude-code-action inside the prebuilt
# `trading-devcontainer` image (already has jj, jst, opam env baked in). The
# orchestrator writes its daily summary to `dev/daily/<date>-runN.md` and
# whatever subagent work it dispatched to branches + PRs. A post-step pushes
# the daily summary branch, opens a PR, then fails the job if the summary has
# any entries in the `## Escalations` section — that's our partial-failure
# signal (see dev/status/orchestrator-automation.md § "Partial-failure
# reporting").
#
# ----------------------------------------------------------------------------
# SECRETS REQUIRED BEFORE THIS WORKFLOW CAN RUN
# ----------------------------------------------------------------------------
# The first `workflow_dispatch` run will fail at the "Run lead-orchestrator"
# step until the human completes the following one-time setup (tracked in
# dev/status/orchestrator-automation.md § "Implementation sequencing" step 2):
#
#   1. BOT_GITHUB_TOKEN — fine-grained Personal Access Token scoped to
#      this repo only. Create at
#      https://github.com/settings/tokens?type=beta
#      Permissions: Contents R+W, Pull requests R+W. Expiration: 1 year
#      (or whatever; set a calendar reminder to rotate).
#      Store as repo secret `BOT_GITHUB_TOKEN`.
#
#      Why a PAT and not the default GITHUB_TOKEN: pushes using the built-in
#      token do not trigger downstream workflows (GitHub safety feature),
#      so CI would not re-run on branches this orchestrator pushes.
#      PAT-issued pushes do trigger them.
#
#      Why a PAT and not a custom GitHub App: both work; an App auto-
#      rotates short-lived tokens and is the Claude Code docs' recommended
#      path, but requires one-time registration + install. For a single-
#      developer setup the PAT is simpler. Swap to an App later if
#      rotation burden hurts.
#
#   2. CLAUDE_CODE_OAUTH_TOKEN — generated on a subscription-authenticated
#      machine via `claude setup-token`. The Pro/Max subscription's session
#      limits act as the effective cost ceiling for this workflow.
#
# ----------------------------------------------------------------------------
name: Daily orchestrator

on:
  # Three runs per day (1 AM / 7 AM / 12 PM Pacific) to amortize the
  # rolling 5-hour Claude quota window. Minute `:17` avoids top-of-hour
  # GHA load (scheduled jobs at :00 – :05 get delayed or silently
  # dropped). GitHub cron is UTC-only, no DST awareness — these are set
  # for UTC-7 (PDT); during PST months they drift back 1 hour.
  schedule:
    - cron: "17 8 * * *"    # 01:17 PT
    - cron: "17 14 * * *"   # 07:17 PT
    - cron: "17 19 * * *"   # 12:17 PT
  workflow_dispatch:

# Queue, do not cancel, if a previous run is still executing when the
# next cron fires. A run mid-dispatch must not be killed — in-flight
# subagents would leave branches half-pushed. Max overlap window is
# bounded by timeout-minutes (180) below.
concurrency:
  group: daily-orchestrator
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # See ci.yml for the rationale: the base image has USER opam, but
      # Actions' post-step file bookkeeping needs root. HOME stays pointed at
      # /home/opam so the opam switch is still discoverable.
      options: --user 0
    env:
      HOME: /home/opam
      # run-in-env.sh takes the native path (cd + opam env, no docker
      # wrapping) when this is set. Agent prompts invoke the wrapper so they
      # work identically in local-docker and in-container (GHA) environments.
      TRADING_IN_CONTAINER: "1"
      # Point data-dependent tests at the in-repo test fixtures (same as
      # ci.yml). Without this, Data_path.default_data_dir() falls back to
      # the Docker-workspace path /workspaces/trading-1/data which does not
      # exist in the GHA runner — health-scanner reports 7 test suites /
      # 38 assertion failures. See dev/daily/2026-04-16-run1.md escalation.
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so jj can see main@origin and rebase properly.
          fetch-depth: 0

      - name: Compute today's date
        id: today
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Colocate jj on the git checkout
        shell: bash
        run: |
          set -euo pipefail
          # actions/checkout@v4 produces a git-only tree. `jst submit`
          # (stacked-PR tool used by feat-agents) requires .jj/, so we
          # colocate jj on top of the existing git repo. This keeps git
          # as the wire format (pushes, remotes, CI triggers) while
          # giving agents the jj local-commit UX they use locally.
          # Decided 2026-04-16 (see dev/decisions.md) — option (2) over
          # adding gh CLI to the container.
          #
          # We skip `jj git fetch`: jj 0.39 shells to `git fetch --porcelain`
          # which requires git >= 2.41, but the ubuntu-22.04 devcontainer base
          # ships git 2.34. actions/checkout@v4 (fetch-depth: 0 above) already
          # populated origin refs in .git/, and `jj git init --colocate`
          # auto-imports them — so no remote fetch is needed here.
          jj git init --colocate

      - name: Run lead-orchestrator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          # show_full_output omitted (default false). Tool-call traces are
          # dumped to the GHA log at ~2-3 MB per run and duplicate content
          # that already lands in the merged daily-summary PR. We read the
          # summary instead; full logs are only needed when debugging the
          # workflow infra itself (container setup, checkout, etc.).
          prompt: |
            Run the daily orchestrator session. Today is ${{ steps.today.outputs.date }}.
            Read .claude/agents/lead-orchestrator.md and follow it end to end.
          claude_args: |
            --agent lead-orchestrator
            --allowedTools Agent,Bash,Read,Write,Edit,Glob,Grep
            --max-turns 200

      - name: Locate daily summary (for escalations check)
        id: publish-summary
        shell: bash
        run: |
          set -euo pipefail
          DATE="$(date +%F)"
          # lead-orchestrator now owns committing/pushing the daily summary
          # branch and opening its PR (it runs with BOT_GITHUB_TOKEN via the
          # claude-code-action and has jj + curl available inside the
          # devcontainer). This step only locates the summary file on disk
          # so the next step can scan it for escalations.
          #
          # Prior versions of this step also did `git switch -c ops/daily-*`
          # + git push + PR create, which collided with the agent's own
          # push once the agent gained that capability. See run
          # 24526632726 for the post-mortem.
          #
          # Pick the newest dev/daily/${DATE}*.md — that's whatever the
          # orchestrator wrote this session (runN.md or plain DATE.md).
          SUMMARY="$(ls -t dev/daily/${DATE}*.md 2>/dev/null | head -n 1 || true)"
          if [ -z "$SUMMARY" ]; then
            SUMMARY="$(ls -t dev/daily/*.md 2>/dev/null | head -n 1 || true)"
          fi
          if [ -z "$SUMMARY" ] || [ ! -f "$SUMMARY" ]; then
            echo "::error::No daily summary file found under dev/daily/."
            exit 1
          fi
          echo "Using daily summary: $SUMMARY"
          echo "summary_path=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Fail on escalations
        env:
          SUMMARY: ${{ steps.publish-summary.outputs.summary_path }}
        shell: bash
        run: |
          set -euo pipefail
          # Extract the ## Escalations section body (up to the next H2).
          section="$(awk '
            /^## Escalations/ { in_section=1; next }
            /^## / && in_section { exit }
            in_section { print }
          ' "$SUMMARY")"

          # Gate only on top-level bullets tagged [critical]. The summary
          # template uses severity tags — [critical], [medium], [info] — so
          # "gate iff the author tagged a top-level escalation critical" is
          # the cleanest contract. [medium] and [info] items surface for
          # visibility without failing the run.
          #
          # Prior pattern matched any `- ` bullet and caught sub-bullets of
          # medium items (e.g. "- (a) Reword the comment" under a [medium]
          # linter-fix suggestion), failing the job on cosmetic notes.
          #
          # Next iteration moved to grep -Ei '\[critical\]' — but that
          # matches the literal string anywhere in the Escalations section,
          # including inside prose describing mitigations (e.g. "cross-check
          # `[critical]` claims against dune build @runtest" in a [medium]
          # bullet, which failed run 24606800779 on 2026-04-18 despite zero
          # actual critical items).
          #
          # Current pattern anchors to a top-level bullet start:
          #   ^-[[:space:]]+(\*\*)?\[critical\]
          # matches `- [critical] ...` and `- **[critical] ...`, which is
          # how the summary template formats escalation bullets. Sub-bullets
          # (indented) and prose containing the literal token `[critical]`
          # are correctly ignored.
          #
          # Positive `[critical]` match means an untagged escalation does
          # NOT gate. That's intentional: tags are a contract, and forcing
          # authors to tag encourages them to think about severity. If an
          # escalation genuinely warrants gating, tag it.
          escalations="$(printf '%s\n' "$section" \
            | grep -E '^-[[:space:]]+(\*\*)?\[critical\]' \
            || true)"

          if [ -n "$escalations" ]; then
            echo "::error::Daily summary has escalations; marking run as failed."
            echo "Escalations found in $SUMMARY:"
            printf '%s\n' "$escalations"
            exit 1
          fi
          echo "No escalations in $SUMMARY — clean run."
