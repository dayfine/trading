# Weekly deep health scan for the Weinstein Trading System.
#
# Dispatches the `health-scanner` agent in deep mode every Monday. The
# resulting dev/health/<YYYY-MM-DD>-deep.md report lands on a branch
# ops/health-deep-<YYYY-MM-DD> and opens a PR for human review.
#
# Unlike the daily-summary PR, this is NOT auto-merged. The deep scan is
# advisory — the human reviews findings and merges manually (or closes if
# the scan is clean and no action is needed).
#
# Schedule: Mondays at 15:17 UTC (08:17 PT). Minute :17 avoids top-of-hour
# GHA load. The daily orchestrator runs at 15:17 UTC on weekdays too, so
# Monday 15:17 UTC fires both; the deep scan is a separate job and does not
# block the orchestrator.
#
# ----------------------------------------------------------------------------
# SECRETS REQUIRED
# ----------------------------------------------------------------------------
#   CLAUDE_CODE_OAUTH_TOKEN — generated via `claude setup-token`.
#   BOT_GITHUB_TOKEN        — fine-grained PAT; Contents R+W, Pull requests R+W.
#   Both are already configured in the repo (shared with orchestrator.yml).
# ----------------------------------------------------------------------------
name: Weekly deep health scan

on:
  schedule:
    - cron: "17 15 * * 1"   # Monday 15:17 UTC (08:17 PT)
  workflow_dispatch:

concurrency:
  group: health-deep-weekly
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  health-deep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ghcr.io/${{ github.repository_owner }}/trading-devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user 0
    env:
      HOME: /home/opam
      TRADING_IN_CONTAINER: "1"
      # Point data-dependent paths at in-repo test fixtures (same as orchestrator.yml).
      TRADING_DATA_DIR: ${{ github.workspace }}/trading/test_data
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Compute today's date
        id: today
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Colocate jj on the git checkout
        shell: bash
        run: |
          set -euo pipefail
          # actions/checkout@v4 produces a git-only tree. Colocate jj so that
          # the health-scanner agent can use jj commands (jj log, etc.) exactly
          # as in local runs. Same pattern as orchestrator.yml.
          jj git init --colocate

      - name: Run health-scanner (deep mode)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.BOT_GITHUB_TOKEN }}
          prompt: |
            Run the deep scan. Today is ${{ steps.today.outputs.date }}.
            Read .claude/agents/health-scanner.md and follow the deep scan instructions end to end.
            Write findings to dev/health/${{ steps.today.outputs.date }}-deep.md.
            Do not modify source code, agent definitions, or status files.
          claude_args: |
            --agent health-scanner
            --allowedTools Agent,Bash,Read,Write,Edit,Glob,Grep
            --max-turns 80

      - name: Push branch and open PR
        if: always()
        env:
          DATE: ${{ steps.today.outputs.date }}
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          BRANCH="ops/health-deep-${DATE}"
          REPORT="dev/health/${DATE}-deep.md"

          # Inside containers run as --user 0, git warns about "dubious
          # ownership" on repos not owned by root; the claude-code-action
          # step above also seems to leave cwd in a state where `git config`
          # fails with "fatal: not in a git directory" (observed in run
          # 24676096493 on 2026-04-20). Re-add the workspace as a safe
          # directory explicitly so the git commands below work from this
          # step regardless of what the action did upstream.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

          # Stage and commit whatever the agent wrote (partial reports are
          # valuable too, hence `if: always()` above).
          git config user.email "bot@github-actions"
          git config user.name "GitHub Actions Bot"

          if git diff --quiet HEAD -- dev/health/ 2>/dev/null && \
             ! git ls-files --others --exclude-standard dev/health/ | grep -q .; then
            echo "No changes in dev/health/ — deep scan produced no output."
            exit 0
          fi

          git checkout -b "${BRANCH}"
          git add dev/health/ || true
          git commit -m "ops: weekly deep health scan ${DATE}" || {
            echo "Nothing to commit (agent may have already committed)."
          }
          git push origin "${BRANCH}"

          # Derive PR body: embed a link to the report and a summary header.
          if [ -f "${REPORT}" ]; then
            SUMMARY_LINE="$(grep -m1 '^- Findings:' "${REPORT}" || echo '- Findings: (see report)')"
            BODY="## Weekly deep health scan — ${DATE}

          ${SUMMARY_LINE}

          Full report: [\`${REPORT}\`](https://github.com/${REPO}/blob/${BRANCH}/${REPORT})

          > This PR is advisory. Review findings and merge (or close if clean)."
          else
            BODY="## Weekly deep health scan — ${DATE}

          The deep scan agent ran but did not produce \`${REPORT}\`. Check the workflow log for details."
          fi

          # Open the PR via GH REST API (claude-code-action does not open PRs).
          # Use python3 for JSON build — devcontainer image lacks jq (see
          # orchestrator.yml's budget step, where the same bug surfaced in
          # run 24856066811 and was fixed in #510).
          PR_PAYLOAD=$(TITLE="ops: weekly deep health scan ${DATE}" HEAD="${BRANCH}" BASE="main" BODY="${BODY}" \
            python3 -c 'import json,os; print(json.dumps({"title":os.environ["TITLE"],"head":os.environ["HEAD"],"base":os.environ["BASE"],"body":os.environ["BODY"],"draft":False}))')
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "$PR_PAYLOAD"
