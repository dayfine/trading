# Linter exception list
#
# Format: <linter> <path-substring> <reason>  # review_at: <milestone-or-condition>
#
# Each linter reads its own section. A file is excluded if its path contains
# the given substring. Add exceptions sparingly with a clear reason.
#
# review_at: optional trailing comment indicating when this exception should be
# reconsidered. The health-scanner deep scan checks for expired entries.
# Examples: "review_at: M5", "review_at: after segmentation refactor"
#
# ── arch_layer ────────────────────────────────────────────────────────────────
# analysis/ modules permitted to import from trading/trading/.

arch_layer analysis/weinstein/portfolio_risk  bridges analysis and trading for position sizing and exposure limits  # review_at: permanent (analysis module; depends on trading.portfolio and status by design)

# ── magic_numbers ─────────────────────────────────────────────────────────────
# The "all thresholds in config" rule applies to analysis/trading logic only.
# Scripts, visualization, and infrastructure legitimately use literal values.

magic_numbers analysis/scripts                Scripts use hardcoded values by design (no config struct)  # review_at: never (scripts are intentionally unconstrained)
magic_numbers analysis/data                   Data pipeline infrastructure, not analysis logic  # review_at: never (infrastructure, not domain logic)
magic_numbers trading/engine/lib/price_path.ml  Numeric literals are all in multiline comment bullet points (expected value ranges); zero bare literals in code  # review_at: when price_path.ml is actively modified
magic_numbers analysis/technical/trend/lib/segmentation.ml  scoring formula weights (0.2, 0.4) are algorithm constants; not domain parameters to expose in config  # review_at: after segmentation is validated in simulation (M5)

magic_numbers analysis/technical/ta_ocaml   ctypes-generated TA-Lib bindings; numeric literals are warning codes and C constants  # review_at: never (generated bindings)

# ── mli_coverage ──────────────────────────────────────────────────────────────

mli_coverage analysis/technical/ta_ocaml    ctypes-generated TA-Lib bindings; .mli files not applicable  # review_at: never (generated bindings)
