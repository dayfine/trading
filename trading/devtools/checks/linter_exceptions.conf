# Linter exception list
#
# Format: <linter> <path-substring> <reason>
#
# Each linter reads its own section. A file is excluded if its path contains
# the given substring. Add exceptions sparingly with a clear reason.
#
# ── arch_layer ────────────────────────────────────────────────────────────────
# analysis/ modules permitted to import from trading/trading/.

arch_layer analysis/weinstein/portfolio_risk  bridges analysis and trading for position sizing and exposure limits

# ── magic_numbers ─────────────────────────────────────────────────────────────
# The "all thresholds in config" rule applies to analysis/trading logic only.
# Scripts, visualization, and infrastructure legitimately use literal values.

magic_numbers analysis/scripts                Scripts use hardcoded values by design (no config struct)
magic_numbers analysis/data                   Data pipeline infrastructure, not analysis logic
magic_numbers trading/engine/lib/price_path.ml  Algorithm constants and comment false-positives; reviewed and accepted
magic_numbers analysis/technical/trend/lib/segmentation.ml  scoring formula weights (0.2, 0.4) are algorithm constants; not domain parameters to expose in config

magic_numbers analysis/technical/ta_ocaml   ctypes-generated TA-Lib bindings; numeric literals are warning codes and C constants

# ── mli_coverage ──────────────────────────────────────────────────────────────

mli_coverage analysis/technical/ta_ocaml    ctypes-generated TA-Lib bindings; .mli files not applicable
